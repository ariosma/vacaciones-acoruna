<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Vacaciones — A Coruña</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #f0f2f5;
      --surface: #ffffff;
      --border: #e2e8f0;
      --text: #1a202c;
      --text-muted: #718096;
      --weekend: #f7fafc;
      --holiday-bg: #fff5f5;
      --holiday-text: #c53030;
      --today-ring: #3182ce;
      --radius: 10px;
      --shadow: 0 1px 3px rgba(0,0,0,.08), 0 4px 16px rgba(0,0,0,.05);
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
    }

    /* ── Layout ── */
    .app { display: flex; flex-direction: column; min-height: 100vh; }

    header {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 0 24px;
      display: flex;
      align-items: center;
      gap: 20px;
      height: 60px;
      box-shadow: 0 1px 4px rgba(0,0,0,.06);
    }
    header h1 { font-size: 1.1rem; font-weight: 700; letter-spacing: -.3px; flex: 1; }
    header h1 span { color: var(--text-muted); font-weight: 400; }

    .main { display: flex; flex: 1; gap: 0; }

    /* ── Sidebar ── */
    aside {
      width: 230px;
      min-width: 230px;
      background: var(--surface);
      border-right: 1px solid var(--border);
      padding: 20px 16px;
      display: flex;
      flex-direction: column;
      gap: 20px;
    }

    .section-title {
      font-size: .7rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: .08em;
      color: var(--text-muted);
      margin-bottom: 8px;
    }

    .users-list { display: flex; flex-direction: column; gap: 6px; }

    .user-item {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 7px 10px;
      border-radius: 8px;
      cursor: pointer;
      transition: background .15s;
      border: 2px solid transparent;
    }
    .user-item:hover { background: var(--bg); }
    .user-item.active { background: var(--bg); border-color: currentColor; }

    .user-dot {
      width: 12px; height: 12px;
      border-radius: 50%;
      flex-shrink: 0;
    }
    .user-name { font-size: .87rem; font-weight: 500; flex: 1; }
    .user-del {
      opacity: 0;
      font-size: .75rem;
      color: var(--text-muted);
      cursor: pointer;
      padding: 2px 5px;
      border-radius: 4px;
      transition: opacity .15s, background .15s;
    }
    .user-item:hover .user-del { opacity: 1; }
    .user-del:hover { background: #fed7d7; color: #c53030; }

    .add-user-form { display: flex; gap: 6px; }
    .add-user-form input {
      flex: 1;
      padding: 7px 10px;
      border: 1px solid var(--border);
      border-radius: 8px;
      font-size: .85rem;
      outline: none;
      transition: border-color .15s;
    }
    .add-user-form input:focus { border-color: #667eea; }
    .add-user-form button {
      padding: 7px 11px;
      background: #667eea;
      color: #fff;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      font-size: .85rem;
      font-weight: 600;
      transition: background .15s;
    }
    .add-user-form button:hover { background: #5a67d8; }

    .legend { display: flex; flex-direction: column; gap: 6px; }
    .legend-item { display: flex; align-items: center; gap: 8px; font-size: .8rem; color: var(--text-muted); }
    .legend-box { width: 14px; height: 14px; border-radius: 3px; flex-shrink: 0; }

    .requests-section { flex: 1; overflow-y: auto; }
    .request-mini {
      display: flex;
      align-items: flex-start;
      gap: 8px;
      padding: 8px 0;
      border-bottom: 1px solid var(--border);
      font-size: .8rem;
    }
    .request-mini:last-child { border-bottom: none; }
    .req-color { width: 4px; height: 36px; border-radius: 2px; flex-shrink: 0; margin-top: 1px; }
    .req-info { flex: 1; }
    .req-user { font-weight: 600; }
    .req-dates { color: var(--text-muted); margin-top: 1px; }
    .req-del { color: var(--text-muted); cursor: pointer; font-size: .7rem; padding: 2px 5px; border-radius: 4px; }
    .req-del:hover { background: #fed7d7; color: #c53030; }
    .no-requests { color: var(--text-muted); font-size: .82rem; text-align: center; padding: 12px 0; }

    /* ── Calendar area ── */
    .calendar-area { flex: 1; padding: 24px; overflow: auto; }

    .cal-nav {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 20px;
    }
    .cal-nav button {
      width: 36px; height: 36px;
      border: 1px solid var(--border);
      background: var(--surface);
      border-radius: 8px;
      cursor: pointer;
      font-size: 1rem;
      display: flex; align-items: center; justify-content: center;
      transition: background .15s;
    }
    .cal-nav button:hover { background: var(--bg); }
    .cal-nav h2 { font-size: 1.25rem; font-weight: 700; min-width: 180px; }
    .cal-nav .spacer { flex: 1; }
    .active-user-badge {
      padding: 6px 14px;
      border-radius: 20px;
      font-size: .82rem;
      font-weight: 600;
      color: #fff;
    }
    .mode-hint {
      font-size: .8rem;
      color: var(--text-muted);
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .selecting-indicator {
      display: inline-block;
      width: 8px; height: 8px;
      border-radius: 50%;
      background: #f6ad55;
      animation: blink 1s infinite;
    }
    @keyframes blink { 50% { opacity: .3; } }

    /* ── Calendar grid ── */
    .calendar {
      background: var(--surface);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      overflow: hidden;
      border: 1px solid var(--border);
    }

    .cal-weekdays {
      display: grid;
      grid-template-columns: repeat(7, 1fr);
      background: #f8fafc;
      border-bottom: 1px solid var(--border);
    }
    .cal-weekday {
      text-align: center;
      padding: 10px 4px;
      font-size: .72rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: .06em;
      color: var(--text-muted);
    }
    .cal-weekday.weekend { color: #fc8181; }

    .cal-days {
      display: grid;
      grid-template-columns: repeat(7, 1fr);
    }

    .cal-day {
      min-height: 100px;
      border-right: 1px solid var(--border);
      border-bottom: 1px solid var(--border);
      padding: 6px;
      cursor: pointer;
      transition: background .1s;
      position: relative;
      overflow: hidden;
    }
    .cal-day:nth-child(7n) { border-right: none; }
    .cal-day:hover { background: #f0f4ff; }
    .cal-day.empty { background: #fafafa; cursor: default; }
    .cal-day.empty:hover { background: #fafafa; }
    .cal-day.weekend { background: var(--weekend); }
    .cal-day.weekend:hover { background: #edf2f7; }
    .cal-day.holiday { background: var(--holiday-bg); }
    .cal-day.holiday:hover { background: #fff0f0; }
    .cal-day.today .day-num { background: var(--today-ring); color: #fff; border-radius: 50%; }
    .cal-day.selecting-start { outline: 2px dashed #f6ad55; outline-offset: -2px; }

    .day-num {
      font-size: .82rem;
      font-weight: 600;
      width: 24px; height: 24px;
      display: flex; align-items: center; justify-content: center;
      margin-bottom: 2px;
    }

    .holiday-name {
      font-size: .65rem;
      color: var(--holiday-text);
      font-weight: 600;
      line-height: 1.2;
      margin-bottom: 3px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .day-requests { display: flex; flex-direction: column; gap: 2px; }

    .req-bar {
      font-size: .68rem;
      font-weight: 600;
      color: #fff;
      padding: 1px 6px;
      border-radius: 3px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      cursor: pointer;
      opacity: .9;
      transition: opacity .12s;
    }
    .req-bar:hover { opacity: 1; }

    /* ── Modal ── */
    .overlay {
      position: fixed; inset: 0;
      background: rgba(0,0,0,.35);
      display: flex; align-items: center; justify-content: center;
      z-index: 100;
      opacity: 0;
      pointer-events: none;
      transition: opacity .2s;
    }
    .overlay.open { opacity: 1; pointer-events: auto; }

    .modal {
      background: var(--surface);
      border-radius: 14px;
      padding: 28px;
      width: 400px;
      max-width: calc(100vw - 32px);
      box-shadow: 0 20px 60px rgba(0,0,0,.18);
      transform: translateY(12px);
      transition: transform .2s;
    }
    .overlay.open .modal { transform: translateY(0); }

    .modal h3 { font-size: 1.05rem; margin-bottom: 18px; }

    .form-group { margin-bottom: 14px; }
    .form-group label { display: block; font-size: .8rem; font-weight: 600; margin-bottom: 5px; color: var(--text-muted); }
    .form-group select,
    .form-group input[type="date"] {
      width: 100%;
      padding: 9px 12px;
      border: 1px solid var(--border);
      border-radius: 8px;
      font-size: .9rem;
      outline: none;
      transition: border-color .15s;
      background: var(--surface);
    }
    .form-group select:focus,
    .form-group input[type="date"]:focus { border-color: #667eea; }

    .form-row { display: flex; gap: 10px; }
    .form-row .form-group { flex: 1; }

    .modal-actions { display: flex; gap: 8px; margin-top: 20px; justify-content: flex-end; }
    .btn {
      padding: 9px 18px;
      border-radius: 8px;
      border: none;
      cursor: pointer;
      font-size: .87rem;
      font-weight: 600;
      transition: background .15s, transform .1s;
    }
    .btn:active { transform: scale(.98); }
    .btn-primary { background: #667eea; color: #fff; }
    .btn-primary:hover { background: #5a67d8; }
    .btn-ghost { background: transparent; color: var(--text-muted); border: 1px solid var(--border); }
    .btn-ghost:hover { background: var(--bg); }

    .toast {
      position: fixed;
      bottom: 24px; right: 24px;
      background: #2d3748;
      color: #fff;
      padding: 12px 18px;
      border-radius: 10px;
      font-size: .87rem;
      z-index: 200;
      transform: translateY(80px);
      opacity: 0;
      transition: transform .25s, opacity .25s;
      max-width: 320px;
    }
    .toast.show { transform: translateY(0); opacity: 1; }

    /* ── Summary ── */
    .summary-item {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 6px 0;
      border-bottom: 1px solid var(--border);
      font-size: .82rem;
    }
    .summary-item:last-child { border-bottom: none; }
    .summary-bar-wrap {
      flex: 1;
      display: flex;
      flex-direction: column;
      gap: 3px;
    }
    .summary-name { font-weight: 600; }
    .summary-track {
      height: 6px;
      background: var(--border);
      border-radius: 3px;
      overflow: hidden;
    }
    .summary-fill {
      height: 100%;
      border-radius: 3px;
      transition: width .4s ease;
    }
    .summary-days {
      font-weight: 700;
      font-size: .8rem;
      min-width: 28px;
      text-align: right;
    }
    .summary-year-tabs {
      display: flex;
      gap: 4px;
      margin-bottom: 10px;
    }
    .summary-year-tab {
      padding: 3px 9px;
      border-radius: 6px;
      font-size: .75rem;
      font-weight: 600;
      cursor: pointer;
      border: 1px solid var(--border);
      background: var(--surface);
      color: var(--text-muted);
      transition: background .15s, color .15s;
    }
    .summary-year-tab.active { background: #667eea; color: #fff; border-color: #667eea; }

    .no-user-warn {
      text-align: center;
      padding: 12px;
      background: #fffbeb;
      border-radius: 8px;
      font-size: .82rem;
      color: #744210;
      margin-bottom: 12px;
      border: 1px solid #fef3c7;
    }

    @media (max-width: 700px) {
      .main { flex-direction: column; }
      aside { width: 100%; min-width: 0; border-right: none; border-bottom: 1px solid var(--border); }
      .cal-day { min-height: 70px; }
    }
  </style>
</head>
<body>
<div class="app">
  <header>
    <h1>📅 Vacaciones <span>— Galicia / A Coruña</span></h1>
  </header>

  <div class="main">
    <!-- Sidebar -->
    <aside>
      <div>
        <div class="section-title">Usuarios</div>
        <div class="users-list" id="usersList"></div>
        <div class="add-user-form" style="margin-top:10px">
          <input id="newUserInput" type="text" placeholder="Nombre..." maxlength="24">
          <button onclick="addUser()">+</button>
        </div>
      </div>

      <div>
        <div class="section-title">Leyenda</div>
        <div class="legend">
          <div class="legend-item">
            <div class="legend-box" style="background:#fff5f5;border:1px solid #fc8181;"></div>
            Festivo
          </div>
          <div class="legend-item">
            <div class="legend-box" style="background:#f7fafc;border:1px solid #e2e8f0;"></div>
            Fin de semana
          </div>
          <div class="legend-item">
            <div class="legend-box" style="background:#ebf4ff;border:2px solid #3182ce;border-radius:50%;"></div>
            Hoy
          </div>
        </div>
      </div>

      <div>
        <div class="section-title">Días cogidos <span id="summaryYear" style="font-weight:400;text-transform:none;letter-spacing:0"></span></div>
        <div id="summaryList"></div>
      </div>

      <div class="requests-section">
        <div class="section-title">Solicitudes</div>
        <div id="requestsList"></div>
      </div>
    </aside>

    <!-- Calendar -->
    <div class="calendar-area">
      <div class="cal-nav">
        <button onclick="prevMonth()">‹</button>
        <button onclick="nextMonth()">›</button>
        <h2 id="calTitle"></h2>
        <div class="spacer"></div>
        <div id="modeHint" class="mode-hint"></div>
        <div id="activeBadge" class="active-user-badge" style="display:none"></div>
      </div>
      <div id="noUserWarn" class="no-user-warn" style="display:none">
        Añade y selecciona un usuario para registrar vacaciones.
      </div>
      <div class="calendar">
        <div class="cal-weekdays">
          <div class="cal-weekday">Lun</div>
          <div class="cal-weekday">Mar</div>
          <div class="cal-weekday">Mié</div>
          <div class="cal-weekday">Jue</div>
          <div class="cal-weekday">Vie</div>
          <div class="cal-weekday weekend">Sáb</div>
          <div class="cal-weekday weekend">Dom</div>
        </div>
        <div class="cal-days" id="calDays"></div>
      </div>
    </div>
  </div>
</div>

<!-- Modal nueva solicitud -->
<div class="overlay" id="overlay">
  <div class="modal">
    <h3 id="modalTitle">Nueva solicitud de vacaciones</h3>
    <div class="form-group">
      <label>Usuario</label>
      <select id="modalUser"></select>
    </div>
    <div class="form-row">
      <div class="form-group">
        <label>Desde</label>
        <input type="date" id="modalStart">
      </div>
      <div class="form-group">
        <label>Hasta</label>
        <input type="date" id="modalEnd">
      </div>
    </div>
    <div class="form-group">
      <label>Nota (opcional)</label>
      <input type="text" id="modalNote" placeholder="Ej: Viaje a Canarias..." maxlength="60"
        style="width:100%;padding:9px 12px;border:1px solid var(--border);border-radius:8px;font-size:.9rem;outline:none;">
    </div>
    <div class="modal-actions">
      <button class="btn btn-ghost" onclick="closeModal()">Cancelar</button>
      <button class="btn btn-primary" onclick="saveRequest()">Guardar solicitud</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

// ═══════════════════════════════════════════════
// STATE & PERSISTENCE
// ═══════════════════════════════════════════════
let state = {
  users: [],
  requests: [],
  activeUserId: localStorage.getItem('vac_activeUser') || null,
};

function save() {
  // activeUserId es local (preferencia de dispositivo)
  localStorage.setItem('vac_activeUser', state.activeUserId || '');
  // users y requests van a Firebase (compartido)
  dataRef.set({
    users:    state.users,
    requests: state.requests,
  });
}

function uid() {
  return Math.random().toString(36).slice(2) + Date.now().toString(36);
}

// ═══════════════════════════════════════════════
// CALENDAR STATE
// ═══════════════════════════════════════════════
const today = new Date();
let viewYear  = today.getFullYear();
let viewMonth = today.getMonth(); // 0-based

// Click-to-select state
let selectingStart = null; // date string 'YYYY-MM-DD'

// ═══════════════════════════════════════════════
// UTILS
// ═══════════════════════════════════════════════
function dateStr(y, m, d) {
  return `${y}-${String(m+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
}

function parseDate(s) {
  const [y,m,d] = s.split('-').map(Number);
  return new Date(y, m-1, d);
}

function formatRange(start, end) {
  const s = parseDate(start);
  const e = parseDate(end);
  const opts = { day: 'numeric', month: 'short' };
  if (start === end) return s.toLocaleDateString('es-ES', opts);
  if (s.getFullYear() === e.getFullYear())
    return `${s.toLocaleDateString('es-ES', opts)} – ${e.toLocaleDateString('es-ES', { day:'numeric', month:'short' })} ${e.getFullYear()}`;
  return `${s.toLocaleDateString('es-ES', opts)} ${s.getFullYear()} – ${e.toLocaleDateString('es-ES', opts)} ${e.getFullYear()}`;
}

function businessDays(start, end) {
  let count = 0;
  const s = parseDate(start), e = parseDate(end);
  for (let d = new Date(s); d <= e; d.setDate(d.getDate()+1)) {
    const dow = d.getDay();
    const ds = `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
    if (dow !== 0 && dow !== 6 && !HOLIDAYS[ds]) count++;
  }
  return count;
}

function getUserById(id) { return state.users.find(u => u.id === id); }

// ═══════════════════════════════════════════════
// USERS
// ═══════════════════════════════════════════════
function addUser() {
  const input = document.getElementById('newUserInput');
  const name = input.value.trim();
  if (!name) return;
  const colorIndex = state.users.length % PALETTE.length;
  const user = { id: uid(), name, color: PALETTE[colorIndex] };
  state.users.push(user);
  state.activeUserId = user.id;
  save();
  input.value = '';
  render();
}

function deleteUser(id) {
  if (!confirm('¿Eliminar usuario y todas sus solicitudes?')) return;
  state.users = state.users.filter(u => u.id !== id);
  state.requests = state.requests.filter(r => r.userId !== id);
  if (state.activeUserId === id) state.activeUserId = state.users[0]?.id ?? null;
  save();
  render();
}

function setActiveUser(id) {
  state.activeUserId = id;
  selectingStart = null;
  save();
  render();
}

// ═══════════════════════════════════════════════
// REQUESTS
// ═══════════════════════════════════════════════
function deleteRequest(id) {
  state.requests = state.requests.filter(r => r.id !== id);
  save();
  render();
}

function saveRequest() {
  const userId = document.getElementById('modalUser').value;
  const start  = document.getElementById('modalStart').value;
  const end    = document.getElementById('modalEnd').value;
  const note   = document.getElementById('modalNote').value.trim();

  if (!userId || !start || !end) { toast('Completa todos los campos.'); return; }
  if (start > end) { toast('La fecha de inicio no puede ser posterior al fin.'); return; }

  state.requests.push({ id: uid(), userId, start, end, note, createdAt: Date.now() });
  save();
  closeModal();
  render();
  toast('✅ Solicitud guardada');
}

// ═══════════════════════════════════════════════
// CALENDAR CLICK
// ═══════════════════════════════════════════════
function onDayClick(ds) {
  if (!state.activeUserId) { toast('Selecciona primero un usuario.'); return; }

  if (!selectingStart) {
    // First click — start selection
    selectingStart = ds;
    render();
    return;
  }

  // Second click — open modal with dates filled
  const start = selectingStart < ds ? selectingStart : ds;
  const end   = selectingStart < ds ? ds : selectingStart;
  selectingStart = null;
  openModal(state.activeUserId, start, end);
}

// ═══════════════════════════════════════════════
// MODAL
// ═══════════════════════════════════════════════
function openModal(userId, start, end) {
  const sel = document.getElementById('modalUser');
  sel.innerHTML = state.users.map(u =>
    `<option value="${u.id}" ${u.id===userId?'selected':''}>${u.name}</option>`
  ).join('');
  document.getElementById('modalStart').value = start || '';
  document.getElementById('modalEnd').value   = end   || '';
  document.getElementById('modalNote').value  = '';
  document.getElementById('overlay').classList.add('open');
  document.getElementById('modalStart').focus();
}

function closeModal() {
  document.getElementById('overlay').classList.remove('open');
  selectingStart = null;
  render();
}

// Close on backdrop click
document.getElementById('overlay').addEventListener('click', e => {
  if (e.target === document.getElementById('overlay')) closeModal();
});

// ═══════════════════════════════════════════════
// TOAST
// ═══════════════════════════════════════════════
let toastTimer;
function toast(msg) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => el.classList.remove('show'), 2800);
}

// ═══════════════════════════════════════════════
// NAVIGATION
// ═══════════════════════════════════════════════
function prevMonth() {
  if (viewMonth === 0) { viewMonth = 11; viewYear--; }
  else viewMonth--;
  selectingStart = null;
  render();
}

function nextMonth() {
  if (viewMonth === 11) { viewMonth = 0; viewYear++; }
  else viewMonth++;
  selectingStart = null;
  render();
}

// ═══════════════════════════════════════════════
// RENDER
// ═══════════════════════════════════════════════
let summaryYear = viewYear;

function render() {
  renderUsers();
  renderCalendar();
  renderRequests();
  renderBadge();
  renderSummary();
}

function renderSummary() {
  const container = document.getElementById('summaryList');
  if (state.users.length === 0) { container.innerHTML = ''; return; }

  // Year tabs
  const years = [...new Set(state.requests.flatMap(r => {
    const ys = [];
    for (let y = parseInt(r.start); y <= parseInt(r.end); y++) ys.push(y);
    return ys;
  }))].sort();
  if (!years.includes(summaryYear)) summaryYear = viewYear;

  const allYears = [...new Set([...years, viewYear])].sort();

  const tabs = allYears.map(y =>
    `<div class="summary-year-tab ${y === summaryYear ? 'active' : ''}" onclick="setSummaryYear(${y})">${y}</div>`
  ).join('');

  // Days per user for selected year
  const totals = state.users.map(u => {
    const days = state.requests
      .filter(r => r.userId === u.id)
      .reduce((acc, r) => {
        // clip to summaryYear
        const yStart = `${summaryYear}-01-01`;
        const yEnd   = `${summaryYear}-12-31`;
        const s = r.start < yStart ? yStart : r.start;
        const e = r.end   > yEnd   ? yEnd   : r.end;
        if (s > e) return acc;
        return acc + businessDays(s, e);
      }, 0);
    return { user: u, days };
  });

  const max = Math.max(...totals.map(t => t.days), 1);

  container.innerHTML = `
    <div class="summary-year-tabs">${tabs}</div>
    ${totals.map(({ user, days }) => `
      <div class="summary-item">
        <div class="user-dot" style="background:${user.color}"></div>
        <div class="summary-bar-wrap">
          <div class="summary-name">${user.name}</div>
          <div class="summary-track">
            <div class="summary-fill" style="width:${(days/max*100).toFixed(1)}%;background:${user.color}"></div>
          </div>
        </div>
        <div class="summary-days" style="color:${user.color}">${days}d</div>
      </div>`).join('')}
  `;
}

function setSummaryYear(y) {
  summaryYear = y;
  renderSummary();
}

function renderUsers() {
  const list = document.getElementById('usersList');
  if (state.users.length === 0) {
    list.innerHTML = '<div style="font-size:.8rem;color:var(--text-muted);padding:4px 0">Sin usuarios aún.</div>';
    return;
  }
  list.innerHTML = state.users.map(u => `
    <div class="user-item ${u.id === state.activeUserId ? 'active' : ''}"
         style="color:${u.color}"
         onclick="setActiveUser('${u.id}')">
      <div class="user-dot" style="background:${u.color}"></div>
      <span class="user-name" style="color:var(--text)">${u.name}</span>
      <span class="user-del" onclick="event.stopPropagation();deleteUser('${u.id}')">✕</span>
    </div>
  `).join('');

  document.getElementById('noUserWarn').style.display = state.users.length === 0 ? '' : 'none';
}

function renderBadge() {
  const badge = document.getElementById('activeBadge');
  const hint  = document.getElementById('modeHint');
  const user  = getUserById(state.activeUserId);

  if (!user) {
    badge.style.display = 'none';
    hint.innerHTML = '';
    return;
  }

  badge.style.display = '';
  badge.style.background = user.color;
  badge.textContent = user.name;

  if (selectingStart) {
    hint.innerHTML = `<span class="selecting-indicator"></span> Haz clic en el día final`;
  } else {
    hint.innerHTML = 'Haz clic en el inicio de las vacaciones';
  }
}

function renderCalendar() {
  const title = document.getElementById('calTitle');
  const monthNames = ['Enero','Febrero','Marzo','Abril','Mayo','Junio',
                      'Julio','Agosto','Septiembre','Octubre','Noviembre','Diciembre'];
  title.textContent = `${monthNames[viewMonth]} ${viewYear}`;

  const container = document.getElementById('calDays');
  container.innerHTML = '';

  const firstDay = new Date(viewYear, viewMonth, 1);
  let startDow = firstDay.getDay(); // 0=Sun..6=Sat → convert to Mon-first
  startDow = startDow === 0 ? 6 : startDow - 1;

  const daysInMonth = new Date(viewYear, viewMonth + 1, 0).getDate();
  const todayStr = dateStr(today.getFullYear(), today.getMonth(), today.getDate());

  // Empty cells before first day
  for (let i = 0; i < startDow; i++) {
    const el = document.createElement('div');
    el.className = 'cal-day empty';
    container.appendChild(el);
  }

  // Build a map: date → requests
  const reqMap = {};
  state.requests.forEach(r => {
    const s = parseDate(r.start), e = parseDate(r.end);
    for (let d = new Date(s); d <= e; d.setDate(d.getDate()+1)) {
      const ds = `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
      if (!reqMap[ds]) reqMap[ds] = [];
      reqMap[ds].push(r);
    }
  });

  for (let day = 1; day <= daysInMonth; day++) {
    const ds = dateStr(viewYear, viewMonth, day);
    const dow = new Date(viewYear, viewMonth, day).getDay(); // 0=Sun,6=Sat
    const isWeekend = dow === 0 || dow === 6;
    const isHoliday = !!HOLIDAYS[ds];
    const isToday   = ds === todayStr;
    const isSelStart = ds === selectingStart;

    const el = document.createElement('div');
    el.className = [
      'cal-day',
      isWeekend ? 'weekend' : '',
      isHoliday ? 'holiday' : '',
      isToday   ? 'today'   : '',
      isSelStart ? 'selecting-start' : '',
    ].filter(Boolean).join(' ');

    el.onclick = () => onDayClick(ds);

    el.innerHTML = `<div class="day-num">${day}</div>`;

    if (isHoliday) {
      el.innerHTML += `<div class="holiday-name" title="${HOLIDAYS[ds]}">${HOLIDAYS[ds]}</div>`;
    }

    const dayReqs = reqMap[ds] || [];
    if (dayReqs.length) {
      el.innerHTML += '<div class="day-requests">' + dayReqs.map(r => {
        const user = getUserById(r.userId);
        if (!user) return '';
        return `<div class="req-bar"
          style="background:${user.color}"
          title="${user.name}${r.note ? ' — '+r.note : ''}"
          onclick="event.stopPropagation();showReqDetail('${r.id}')">${user.name}</div>`;
      }).join('') + '</div>';
    }

    container.appendChild(el);
  }
}

function renderRequests() {
  const list = document.getElementById('requestsList');
  if (state.requests.length === 0) {
    list.innerHTML = '<div class="no-requests">Sin solicitudes todavía.</div>';
    return;
  }
  // Sort newest first
  const sorted = [...state.requests].sort((a,b) => b.createdAt - a.createdAt);
  list.innerHTML = sorted.map(r => {
    const user = getUserById(r.userId);
    if (!user) return '';
    const bd = businessDays(r.start, r.end);
    return `
      <div class="request-mini">
        <div class="req-color" style="background:${user.color}"></div>
        <div class="req-info">
          <div class="req-user">${user.name}</div>
          <div class="req-dates">${formatRange(r.start, r.end)}</div>
          <div class="req-dates">${bd} día${bd!==1?'s':''} laborable${bd!==1?'s':''}</div>
          ${r.note ? `<div class="req-dates" style="font-style:italic">${r.note}</div>` : ''}
        </div>
        <span class="req-del" onclick="deleteRequest('${r.id}')">✕</span>
      </div>`;
  }).join('');
}

function showReqDetail(id) {
  const r = state.requests.find(x => x.id === id);
  if (!r) return;
  const user = getUserById(r.userId);
  const bd = businessDays(r.start, r.end);
  if (confirm(`${user?.name ?? '?'}\n${formatRange(r.start, r.end)}\n${bd} días laborables${r.note ? '\n'+r.note : ''}\n\n¿Eliminar esta solicitud?`)) {
    deleteRequest(id);
  }
}

// ═══════════════════════════════════════════════
// KEYBOARD
// ═══════════════════════════════════════════════
document.addEventListener('keydown', e => {
  if (e.key === 'Escape') { closeModal(); selectingStart = null; render(); }
  if (e.key === 'Enter' && document.getElementById('overlay').classList.contains('open')) saveRequest();
  if (!document.getElementById('overlay').classList.contains('open')) {
    if (e.key === 'ArrowLeft')  prevMonth();
    if (e.key === 'ArrowRight') nextMonth();
  }
});

document.getElementById('newUserInput').addEventListener('keydown', e => {
  if (e.key === 'Enter') addUser();
});

// ═══════════════════════════════════════════════
// INIT — escucha Firebase en tiempo real
// ═══════════════════════════════════════════════
document.getElementById('calDays').innerHTML =
  '<div style="grid-column:1/-1;padding:40px;text-align:center;color:var(--text-muted);font-size:.9rem">Conectando…</div>';

dataRef.on('value', snapshot => {
  const data = snapshot.val();
  state.users    = data?.users    || [];
  state.requests = data?.requests || [];

  // Si el usuario activo ya no existe, resetear
  if (state.activeUserId && !state.users.find(u => u.id === state.activeUserId)) {
    state.activeUserId = state.users[0]?.id || null;
    localStorage.setItem('vac_activeUser', state.activeUserId || '');
  }

  render();
});
</script>

</body>
</html>
